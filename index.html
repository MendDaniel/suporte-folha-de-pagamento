<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Suporte Folha de Pagamento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">Carregando documentação...</div>
  <script>
    window.$docsify = {
      name: 'Suporte Folha',
      loadSidebar: true, // Ativa o menu lateral
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md' // Linha essencial para encontrar o menu na raiz
      },
      subMaxLevel: 2
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
